<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Secure-context APIs (the camera via getUserMedia) don't exist on http.
      // Bounce any insecure load up to https before anything else runs — covers
      // an installed PWA whose start URL was captured over http.
      (function () {
        var h = location.hostname;
        if (
          location.protocol === "http:" &&
          h !== "localhost" &&
          h !== "127.0.0.1"
        ) {
          location.replace(
            "https://" +
              location.host +
              location.pathname +
              location.search +
              location.hash
          );
        }
      })();
    </script>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Rephoto</title>
    <meta
      name="description"
      content="Rephoto — a photo aligner. Line up two photos of the same place into before/after sliders, with a live camera ghost overlay."
    />
    <meta name="theme-color" content="#14161a" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Rephoto" />
    <style>
      /* Base background matches the splash so no white shows through at the
         safe-area / home-indicator edges before the app stylesheet loads
         (fixes a white bar along the bottom on iOS). */
      html, body { margin: 0; background: #14161a; }
      /* Branded loading splash — shown from first paint until the app mounts
         (React replaces #root's contents on render). Styled inline because the
         app's stylesheet hasn't loaded yet at this point. */
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: #14161a;
        color: #f4efe6;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        padding: max(env(safe-area-inset-top), 16px)
          env(safe-area-inset-right) env(safe-area-inset-bottom)
          env(safe-area-inset-left);
      }
      #splash .mark {
        width: 96px;
        height: 96px;
        border-radius: 22px;
        overflow: hidden;
        box-shadow: 0 16px 40px -14px rgba(0, 0, 0, 0.6);
      }
      #splash .word {
        font-weight: 700;
        font-size: 32px;
        letter-spacing: -0.02em;
      }
      #splash .sub {
        font-size: 14px;
        /* Colour + pulse floor chosen so the dimmest frame still clears WCAG AA
           (4.5:1) against the #14161a background — 6.18:1 at 0.7 opacity. */
        color: #c7cede;
        animation: splashPulse 1.4s ease-in-out infinite;
      }
      @keyframes splashPulse {
        0%, 100% { opacity: 0.7; }
        50% { opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        #splash .sub { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main id="splash" aria-label="Loading Rephoto">
        <svg class="mark" viewBox="0 0 96 96" aria-hidden="true">
          <rect x="0" y="0" width="48" height="96" fill="#8c95a1" />
          <rect x="48" y="0" width="48" height="96" fill="#f5a11e" />
          <rect x="45" y="0" width="6" height="96" fill="#ffffff" />
          <circle cx="48" cy="48" r="15" fill="#ffffff" />
          <g stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
            <path d="M45 42 L39 48 L45 54" stroke="#3a424e" />
            <path d="M51 42 L57 48 L51 54" stroke="#f5a11e" />
          </g>
        </svg>
        <div class="word">Rephoto</div>
        <div class="sub" role="status">Lining things up…</div>
      </main>
    </div>

    <!--
      OpenCV.js is a ~10 MB Emscripten runtime. We load it here, during initial
      page parse, for two reasons:
        1. Emscripten begins initialising as the script loads; kicking it off
           now (rather than from a React effect after the `load` event) avoids
           the runtime stalling while it waits on page-lifecycle hooks.
        2. We only start the React app once the runtime is ready, so the app
           can use OpenCV immediately and never has to render a half-loaded
           state. Emscripten's UMD wrapper adopts this pre-declared `Module`.
    -->
    <script>
      var Module = {
        onRuntimeInitialized: function () {
          window.__openCvReady = true;
        },
      };
      (function () {
        var s = document.createElement("script");
        s.src = "./opencv.js";
        s.async = true;
        s.onerror = function () {
          window.__openCvError = "Failed to load ./opencv.js";
        };
        document.head.appendChild(s);
      })();
    </script>

    <script type="module">
      // Start the app once OpenCV is ready (or has definitively failed).
      const isReady = () =>
        window.cv &&
        typeof window.cv.Mat === "function" &&
        typeof window.cv.imread === "function" &&
        typeof window.cv.findHomography === "function";

      const start = () => import("./src/main.tsx");

      (function poll() {
        if (isReady() || window.__openCvError) start();
        else setTimeout(poll, 50);
      })();
    </script>
  </body>
</html>
