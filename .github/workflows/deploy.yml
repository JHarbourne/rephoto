name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; let the newest win.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Served at the root of the custom domain (rephoto.nearmark.co.uk, set
          # via public/CNAME), so the base is "/" — asset URLs and the PWA
          # service-worker scope resolve from the domain root.
          VITE_BASE: "/"
          # Cloudflare Web Analytics beacon token (optional). Add a repo
          # secret named CF_BEACON_TOKEN to switch analytics on — no code
          # change needed; empty = analytics stays off.
          VITE_CF_BEACON: ${{ secrets.CF_BEACON_TOKEN }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    steps:
      # GitHub's Pages publish backend intermittently returns
      # "Deployment failed, try again later." The build is fine — only the
      # publish flakes — so attempt it, and automatically retry once on failure
      # instead of silently leaving the site on a stale build.
      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Retry deploy if the first attempt flaked
        if: steps.deployment.outcome == 'failure'
        id: deployment_retry
        uses: actions/deploy-pages@v4
